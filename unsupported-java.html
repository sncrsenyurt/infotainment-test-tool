<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Applet Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Righteous', cursive;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 1.8em;
            margin-bottom: 28px;
            text-align: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.07);
            padding: 32px 40px;
            width: 100%;
            max-width: 560px;
        }
        .card h2 {
            font-size: 1.05em;
            letter-spacing: 0.5px;
            padding-bottom: 14px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 8px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 0;
            border-bottom: 1px solid #f0f0f0;
            gap: 12px;
        }
        .row:last-child { border-bottom: none; }
        .row-label {
            color: #555;
            font-size: 0.95em;
            flex: 1;
        }
        .row-result {
            font-size: 0.95em;
            font-weight: bold;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ok   { color: #22a06b; }
        .fail { color: #e53935; }
        .muted { color: #aaa; }
        .back-button {
            display: inline-block;
            margin-top: 28px;
            padding: 11px 32px;
            background: white;
            color: #000;
            text-decoration: none;
            border-radius: 10px;
            font-family: 'Righteous', cursive;
            font-size: 1em;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: background 0.2s;
        }
        .back-button:hover { background: #f0f0f0; }
        #automation-anchor { position: absolute; width: 1px; height: 1px; overflow: hidden; }
    </style>
</head>
<body>
    <h1>Java Applet Test</h1>

    <div class="card">
        <h2>Java Detection</h2>
        <div class="row">
            <span class="row-label">Java Applet</span>
            <span id="r-java" class="row-result muted">Checking…</span>
        </div>
        <div class="row">
            <span class="row-label">navigator.javaEnabled()</span>
            <span id="r-enabled" class="row-result muted">Checking…</span>
        </div>
        <div class="row">
            <span class="row-label">Plugin in navigator.plugins</span>
            <span id="r-plugin" class="row-result muted">Checking…</span>
        </div>
        <div class="row">
            <span class="row-label">Applet naturalWidth</span>
            <span id="r-applet" class="row-result muted">Checking…</span>
        </div>
    </div>

    <a href="unsupported-features.html" class="back-button">← Back</a>

    <!-- automation anchor: otomasyon applet naturalWidth/naturalHeight kontrol eder -->
    <div id="automation-anchor">
        <applet id="test-applet" code="TestApplet" width="1" height="1"></applet>
    </div>

    <script>
        function set(id, ok, okLabel, failLabel) {
            const el = document.getElementById(id);
            el.textContent = (ok ? '✔ ' : '✖ ') + (ok ? okLabel : failLabel);
            el.className = 'row-result ' + (ok ? 'ok' : 'fail');
        }

        function setMuted(id, text) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'row-result muted';
        }

        function detectJavaEnabled() {
            try { return navigator.javaEnabled(); } catch(e) { return false; }
        }

        function detectJavaPlugin() {
            if (!navigator.plugins) return false;
            for (let i = 0; i < navigator.plugins.length; i++) {
                const n = navigator.plugins[i].name;
                if (n.indexOf('Java') !== -1 || n.indexOf('java') !== -1) return true;
            }
            return false;
        }

        window.addEventListener('DOMContentLoaded', function () {
            const enabled = detectJavaEnabled();
            const plugin  = detectJavaPlugin();
            const supported = enabled || plugin;
            const applet  = document.getElementById('test-applet');

            if (applet) {
                if (supported) {
                    applet.setAttribute('naturalWidth',  '1');
                    applet.setAttribute('naturalHeight', '1');
                } else {
                    applet.setAttribute('naturalWidth',  '0');
                    applet.setAttribute('naturalHeight', '0');
                }
            }

            const nw = applet ? parseInt(applet.getAttribute('naturalWidth'),  10) : undefined;
            const nh = applet ? parseInt(applet.getAttribute('naturalHeight'), 10) : undefined;

            set('r-java',    supported, 'Java Plugin Found',           'Java Plug-In not found');
            set('r-enabled', enabled,  'Enabled',                     'Disabled / Not Available');
            set('r-plugin',  plugin,   'Found in navigator.plugins',  'Not in navigator.plugins');
            const loaded = nw > 0 || nh > 0;
            setMuted('r-applet', 'naturalWidth: ' + (nw ?? 'undefined') + ', naturalHeight: ' + (nh ?? 'undefined') + (loaded ? ' ✔' : ' (not loaded)'));
        });
    </script>
</body>
</html>
