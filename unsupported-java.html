<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Applet Test</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Righteous', cursive;
            margin: 0;
            padding: 20px;
            background: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 { text-align: center; margin-bottom: 30px; }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 40px 50px;
            min-width: 420px;
            max-width: 600px;
            width: 100%;
        }
        .card h2 {
            font-size: 1.1em;
            margin: 0 0 20px 0;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 12px;
            letter-spacing: 1px;
        }
        table { width: 100%; border-collapse: collapse; }
        td {
            padding: 11px 8px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.95em;
        }
        td:first-child { color: #555; width: 55%; }
        td:last-child { font-weight: bold; text-align: right; }
        .status-ok      { color: #22a06b; }
        .status-fail    { color: #e53935; }
        .status-unknown { color: #999; }
        .icon { font-size: 1.1em; margin-right: 4px; }
        .back-button {
            display: inline-block;
            padding: 10px 25px;
            margin-top: 30px;
            background: white;
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-family: 'Righteous', cursive;
            font-size: 1em;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: background-color 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .back-button:hover { background: #f8f9fa; }
    </style>
</head>
<body>
    <h1>Java Applet Test</h1>
    <div class="card">
        <h2>Java Detection</h2>
        <table>
            <tr>
                <td>Java Applet</td>
                <td id="result-java" class="status-unknown">Checking...</td>
            </tr>
            <tr>
                <td>navigator.javaEnabled()</td>
                <td id="result-javaenabled" class="status-unknown">Checking...</td>
            </tr>
            <tr>
                <td>Java Plugin in navigator.plugins</td>
                <td id="result-javaplugin" class="status-unknown">Checking...</td>
            </tr>
            <tr>
                <td>Applet naturalWidth</td>
                <td id="result-applet" class="status-unknown">Checking...</td>
            </tr>
        </table>
    </div>

    <!-- Automation anchor: otomasyon bu applet'in naturalWidth/naturalHeight'ini kontrol eder -->
    <applet id="automation-anchor" code="TestApplet" width="1" height="1"></applet>

    <a href="unsupported-features.html" class="back-button">Back</a>

    <script>
        function setResult(id, supported, trueLabel, falseLabel) {
            const el = document.getElementById(id);
            if (supported) {
                el.innerHTML = '<span class="icon">✔</span>' + trueLabel;
                el.className = 'status-ok';
            } else {
                el.innerHTML = '<span class="icon">✖</span>' + falseLabel;
                el.className = 'status-fail';
            }
        }

        function setNeutral(id, label) {
            const el = document.getElementById(id);
            el.innerHTML = label;
            el.className = 'status-unknown';
        }

        function detectJavaEnabled() {
            try { return navigator.javaEnabled(); } catch(e) { return false; }
        }

        function detectJavaPlugin() {
            if (navigator.plugins) {
                for (let i = 0; i < navigator.plugins.length; i++) {
                    const n = navigator.plugins[i].name;
                    if (n.indexOf('Java') !== -1 || n.indexOf('java') !== -1) return true;
                }
            }
            return false;
        }

        window.addEventListener('DOMContentLoaded', function() {
            const javaEnabled = detectJavaEnabled();
            const javaPlugin  = detectJavaPlugin();
            const supported   = javaEnabled || javaPlugin;

            const applet = document.getElementById('automation-anchor');
            const nw = applet ? applet.naturalWidth : 0;
            const nh = applet ? applet.naturalHeight : 0;
            const appletLoaded = nw > 0 || nh > 0;

            setResult('result-java',        supported,    'Java Plugin Found',          'Java Plug-In not found');
            setResult('result-javaenabled', javaEnabled,  'Enabled',                    'Disabled / Not Available');
            setResult('result-javaplugin',  javaPlugin,   'Found in navigator.plugins', 'Not in navigator.plugins');
            setNeutral('result-applet', 'naturalWidth: ' + nw + ', naturalHeight: ' + nh
                + (appletLoaded ? ' ✔' : ' (not loaded)'));
        });
    </script>
</body>
</html>
