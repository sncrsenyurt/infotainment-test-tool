<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Righteous', cursive;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 1.8em;
            margin-bottom: 12px;
            text-align: center;
        }
        #plugin-warning {
            font-size: 1.25em;
            font-weight: bold;
            color: #e53935;
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: 0.5px;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.07);
            padding: 32px 40px;
            width: 100%;
            max-width: 560px;
        }
        .card h2 {
            font-size: 1.05em;
            letter-spacing: 0.5px;
            padding-bottom: 14px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 8px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 0;
            border-bottom: 1px solid #f0f0f0;
            gap: 12px;
        }
        .row:last-child { border-bottom: none; }
        .row-label {
            color: #555;
            font-size: 0.95em;
            flex: 1;
        }
        .row-result {
            font-size: 0.95em;
            font-weight: bold;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ok   { color: #22a06b; }
        .fail { color: #e53935; }
        .muted { color: #aaa; }
        .back-button {
            display: inline-block;
            margin-top: 28px;
            padding: 11px 32px;
            background: white;
            color: #000;
            text-decoration: none;
            border-radius: 10px;
            font-family: 'Righteous', cursive;
            font-size: 1em;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: background 0.2s;
        }
        .back-button:hover { background: #f0f0f0; }
        #automation-anchor { position: absolute; width: 1px; height: 1px; overflow: hidden; }
    </style>
</head>
<body>
    <h1>Flash Test</h1>

    <!-- automation anchor: otomasyon "this plugin is not" string'ini sayfa text'inde arar -->
    <p id="plugin-warning"></p>

    <div class="card">
        <h2>Flash Detection</h2>
        <div class="row">
            <span class="row-label">Flash Player</span>
            <span id="r-flash" class="row-result muted">Checking…</span>
        </div>
        <div class="row">
            <span class="row-label">Plugin in navigator.plugins</span>
            <span id="r-plugin" class="row-result muted">Checking…</span>
        </div>
        <div class="row">
            <span class="row-label">Flash Version</span>
            <span id="r-version" class="row-result muted">Checking…</span>
        </div>
    </div>

    <a href="unsupported-features.html" class="back-button">← Back</a>

    <div id="automation-anchor">
        <embed type="application/x-shockwave-flash" src="nonexistent.swf" width="1" height="1">
    </div>

    <script>
        function set(id, ok, okLabel, failLabel) {
            const el = document.getElementById(id);
            el.textContent = (ok ? '✔ ' : '✖ ') + (ok ? okLabel : failLabel);
            el.className = 'row-result ' + (ok ? 'ok' : 'fail');
        }

        function setMuted(id, text) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = 'row-result muted';
        }

        function detectFlashPlugin() {
            if (!navigator.plugins) return false;
            for (let i = 0; i < navigator.plugins.length; i++) {
                const n = navigator.plugins[i].name;
                if (n.indexOf('Flash') !== -1 || n.indexOf('Shockwave') !== -1) return true;
            }
            return false;
        }

        function getFlashVersion() {
            if (navigator.plugins && navigator.plugins['Shockwave Flash'])
                return navigator.plugins['Shockwave Flash'].description;
            try {
                const ax = new window.ActiveXObject('ShockwaveFlash.ShockwaveFlash');
                return ax.GetVariable('$version');
            } catch(e) {}
            return null;
        }

        function detectFlashAX() {
            try { new window.ActiveXObject('ShockwaveFlash.ShockwaveFlash'); return true; } catch(e) {}
            return false;
        }

        window.addEventListener('DOMContentLoaded', function () {
            const plugin    = detectFlashPlugin();
            const ax        = detectFlashAX();
            const supported = plugin || ax;
            const version   = getFlashVersion();

            document.getElementById('plugin-warning').textContent = supported
                ? 'Flash plugin is active'
                : 'this plugin is not supported';

            set('r-flash',  supported, 'Flash Player Found',          'Flash Plug-In not found');
            set('r-plugin', plugin,    'Found in navigator.plugins',  'Not in navigator.plugins');
            setMuted('r-version', version || '—');
        });
    </script>
</body>
</html>
