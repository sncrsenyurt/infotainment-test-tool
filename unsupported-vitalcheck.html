<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital Check</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Righteous', cursive;
            margin: 0;
            padding: 20px;
            background: #f5f7fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h1 { text-align: center; margin-bottom: 30px; }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            padding: 40px 50px;
            min-width: 420px;
            max-width: 600px;
            width: 100%;
        }
        .card h2 {
            font-size: 1.1em;
            margin: 0 0 20px 0;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 12px;
            letter-spacing: 1px;
        }
        table { width: 100%; border-collapse: collapse; }
        td {
            padding: 11px 8px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 0.95em;
        }
        td:first-child { color: #555; width: 55%; }
        td:last-child { font-weight: bold; text-align: right; }
        .status-ok      { color: #22a06b; }
        .status-fail    { color: #e53935; }
        .status-unknown { color: #999; }
        .icon { font-size: 1.1em; margin-right: 4px; }
        .btn-section {
            margin-top: 28px;
            text-align: center;
            border-top: 2px solid #f0f0f0;
            padding-top: 24px;
        }
        button[name="vitalcheck"] {
            padding: 12px 36px;
            font-family: 'Righteous', cursive;
            font-size: 1em;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }
        button[name="vitalcheck"]:hover {
            background: #f8f9fa;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }
        #ButtonClickInfo {
            margin-top: 16px;
            font-size: 1.05em;
            min-height: 1.4em;
            color: #22a06b;
        }
        .back-button {
            display: inline-block;
            padding: 10px 25px;
            margin-top: 30px;
            background: white;
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-family: 'Righteous', cursive;
            font-size: 1em;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: background-color 0.3s ease;
            border: none;
            cursor: pointer;
        }
        .back-button:hover { background: #f8f9fa; }
    </style>
</head>
<body>
    <h1>Vital Check</h1>
    <div class="card">
        <h2>Browser Vital Check</h2>
        <table>
            <tr>
                <td>JavaScript</td>
                <td id="result-js" class="status-ok"><span class="icon">✔</span>Enabled</td>
            </tr>
            <tr>
                <td>Page Load</td>
                <td id="result-load" class="status-unknown">Checking...</td>
            </tr>
            <tr>
                <td>DOM Ready</td>
                <td id="result-dom" class="status-unknown">Checking...</td>
            </tr>
            <tr>
                <td>Crash Check (Button)</td>
                <td id="result-crash" class="status-unknown">Click button below</td>
            </tr>
        </table>
        <div class="btn-section">
            <button name="vitalcheck" onclick="vitalCheck()">Vital Check</button>
            <p id="ButtonClickInfo"></p>
        </div>
    </div>

    <a href="unsupported-features.html" class="back-button">Back</a>

    <script>
        function vitalCheck() {
            document.getElementById('ButtonClickInfo').textContent = 'Still alive';
            const el = document.getElementById('result-crash');
            el.innerHTML = '<span class="icon">✔</span>Still alive';
            el.className = 'status-ok';
        }

        window.addEventListener('DOMContentLoaded', function() {
            const dom = document.getElementById('result-dom');
            dom.innerHTML = '<span class="icon">✔</span>Ready';
            dom.className = 'status-ok';
        });

        window.addEventListener('load', function() {
            const load = document.getElementById('result-load');
            load.innerHTML = '<span class="icon">✔</span>Complete';
            load.className = 'status-ok';
        });
    </script>
</body>
</html>
