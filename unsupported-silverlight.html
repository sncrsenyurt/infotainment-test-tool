<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverlight Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Righteous', cursive;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        h1 {
            font-size: 1.8em;
            margin-bottom: 28px;
            text-align: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.07);
            padding: 32px 40px;
            width: 100%;
            max-width: 560px;
        }
        .card h2 {
            font-size: 1.05em;
            letter-spacing: 0.5px;
            padding-bottom: 14px;
            border-bottom: 2px solid #f0f0f0;
            margin-bottom: 8px;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 13px 0;
            border-bottom: 1px solid #f0f0f0;
            gap: 12px;
        }
        .row:last-child { border-bottom: none; }
        .row-label {
            color: #555;
            font-size: 0.95em;
            flex: 1;
        }
        .row-result {
            font-size: 0.95em;
            font-weight: bold;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .ok   { color: #22a06b; }
        .fail { color: #e53935; }
        .muted { color: #aaa; }
        .back-button {
            display: inline-block;
            margin-top: 28px;
            padding: 11px 32px;
            background: white;
            color: #000;
            text-decoration: none;
            border-radius: 10px;
            font-family: 'Righteous', cursive;
            font-size: 1em;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: background 0.2s;
        }
        .back-button:hover { background: #f0f0f0; }
        /* automation element */
        #automation-anchor { position: absolute; width: 1px; height: 1px; overflow: hidden; }
    </style>
</head>
<body>
    <h1>Silverlight Test</h1>

    <div class="card">
        <h2>Silverlight Detection</h2>
        <div class="row">
            <span class="row-label">Silverlight</span>
            <span id="r-silverlight" class="row-result muted">Checking…</span>
        </div>
        <div class="row">
            <span class="row-label">Click-To-Play</span>
            <span id="r-ctp" class="row-result muted">Checking…</span>
        </div>
        <div class="row">
            <span class="row-label">Plugin in navigator.plugins</span>
            <span id="r-plugin" class="row-result muted">Checking…</span>
        </div>
    </div>

    <a href="unsupported-features.html" class="back-button">← Back</a>

    <!-- automation anchor: otomasyon ilk <img> alt="Get Microsoft Silverlight" kontrol eder -->
    <div id="automation-anchor">
        <object type="application/x-silverlight" data="data:," width="1" height="1">
            <img alt="Get Microsoft Silverlight" src="about:blank">
        </object>
    </div>

    <script>
        function set(id, ok, okLabel, failLabel) {
            const el = document.getElementById(id);
            el.textContent = (ok ? '✔ ' : '✖ ') + (ok ? okLabel : failLabel);
            el.className = 'row-result ' + (ok ? 'ok' : 'fail');
        }

        function detectSilverlightPlugin() {
            if (!navigator.plugins) return false;
            for (let i = 0; i < navigator.plugins.length; i++)
                if (navigator.plugins[i].name.indexOf('Silverlight') !== -1) return true;
            return false;
        }

        function detectSilverlightAX() {
            try { new window.ActiveXObject('AgControl.AgControl'); return true; } catch(e) {}
            try { new window.ActiveXObject('AgControl.AgControl.5.0'); return true; } catch(e) {}
            return false;
        }

        window.addEventListener('DOMContentLoaded', function () {
            const plugin    = detectSilverlightPlugin();
            const ax        = detectSilverlightAX();
            const supported = plugin || ax;
            set('r-silverlight', supported, 'Found',                    'Silverlight Plug-In not found');
            set('r-ctp',         false,     'Click-To-Play Active',     'Not Applicable');
            set('r-plugin',      plugin,    'Found in navigator.plugins','Not in navigator.plugins');
        });
    </script>
</body>
</html>
