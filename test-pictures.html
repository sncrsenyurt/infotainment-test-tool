<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Pictures</title>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Righteous', cursive;
            margin: 0;
            padding: 20px;
            background: #f5f7fa;
        }

        .icon-grid {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            flex-wrap: nowrap;
            max-width: 1200px;
            margin: 0 auto;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            height: 200px;
            width: 200px;
            box-sizing: border-box;
        }

        .icon:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.1);
        }

        .icon img {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            object-fit: contain;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        .icon:hover img {
            transform: scale(1.1) rotate(5deg);
            filter: drop-shadow(0 6px 8px rgba(0,0,0,0.15));
        }

        .icon span {
            color: #000;
            text-align: center;
            font-family: 'Righteous', cursive;
            font-size: 1em;
            letter-spacing: 0.5px;
            max-width: 150px;
            margin: 0 auto;
            line-height: 1.4;
            transition: all 0.3s ease;
        }

        .icon:hover span {
            transform: scale(1.05);
            color: #000;
        }

        .container {
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Righteous', cursive;
        }

        .back-button {
            display: inline-block;
            padding: 10px 25px;
            margin: 20px 0;
            background: white;
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-family: 'Righteous', cursive;
            font-size: 1em;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: background-color 0.3s ease;
            border: none;
            cursor: pointer;
            position: absolute;
            bottom: 20px;
            right: 20px;
        }

        .back-button:hover {
            background: #f8f9fa;
        }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Test Pictures[Browser-Multimedia-1 to 6]</h1>
        <div class="icon-grid">
            <a href="images/car pictures/jpg.jpg" class="icon" target="_blank">
                <img src="images/other icons/jpg.png" alt="JPEG">
                <span>Browser-Multimedia-001</span>
                <span>JPEG</span>
            </a>
            <a href="images/car pictures/gif.gif" class="icon" target="_blank">
                <img src="images/other icons/picture.png" alt="GIF">
                <span>Browser-Multimedia-002</span>
                <span>GIF</span>
            </a>
            <a href="images/car pictures/png.png" class="icon" target="_blank">
                <img src="images/other icons/png.png" alt="PNG">
                <span>Browser-Multimedia-003</span>
                <span>PNG</span>
            </a>
            <a href="images/car pictures/tif.tif" class="icon" target="_blank">
                <img src="images/other icons/image.png" alt="TIF">
                <span>Browser-Multimedia-004</span>
                <span>TIFF</span>
            </a>
            <a href="https://people.math.sc.edu/Burkardt/data/tif/tif.html" class="icon" target="_blank">
                <img src="images/other icons/Other Samples.png" alt="Other Samples" style="width: 50%;">
                <span>Other Samples</span>
            </a>
        </div>
        
        <a href="index.html" class="back-button">Back to Home</a>
    </div>
</body>
</html>
